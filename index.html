<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Nata 💗</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Poppins', sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#ffeef5);
overflow:hidden;

}

/* hearts background */

.hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

.heart{

position:absolute;
color:#ff6f91;
animation:fall linear infinite;

}

@keyframes fall{

0%{
transform:translateY(-10vh);
opacity:0;
}

30%{
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}

}

/* envelope */

.envelope{

z-index:2;
width:70vw;
max-width:260px;
height:160px;
background:#ff6f91;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-weight:bold;
font-size:18px;
cursor:pointer;

box-shadow:0 10px 30px rgba(0,0,0,0.15);

animation:shake 1.6s infinite;

}

@keyframes shake{

0%{transform:rotate(0)}
25%{transform:rotate(2deg)}
50%{transform:rotate(-2deg)}
75%{transform:rotate(2deg)}
100%{transform:rotate(0)}

}

/* letter */

.letter{

position:absolute;

width:85vw;
max-width:360px;

background:white;
padding:25px;

border-radius:18px;

box-shadow:0 20px 40px rgba(0,0,0,0.2);

text-align:center;

display:none;

z-index:3;

animation:pop 0.6s ease;

}

@keyframes pop{

0%{
transform:scale(0.8);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}

}

.title{

font-size:22px;
color:#ff4f81;
font-weight:bold;

}

.text{

font-size:14px;
margin-top:10px;
color:#444;

opacity:0;

transition:0.5s;

}

button{

margin-top:16px;

background:#ff4f81;

border:none;

color:white;

padding:10px 18px;

border-radius:12px;

font-size:14px;

cursor:pointer;

box-shadow:0 6px 15px rgba(255,79,129,0.4);

}

/* popup */

.popup{

position:fixed;

bottom:-200px;

left:50%;

transform:translateX(-50%);

background:white;

padding:20px;

border-radius:16px;

width:80vw;

max-width:320px;

text-align:center;

box-shadow:0 15px 40px rgba(0,0,0,0.2);

transition:0.6s;

z-index:5;

}

.popup.show{

bottom:40px;

}

</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="envelope" onclick="openLetter()">

tap me 💌

</div>

<div class="letter" id="letter">

<div class="title">

hey nata 💗

</div>

<p class="text">

meeting you was kinda random

</p>

<p class="text">

but somehow you became my favorite person

</p>

<p class="text">

life feels softer when you're around

</p>

<p class="text" style="color:#ff4f81;font-weight:bold">

i love you

</p>

<button onclick="showLove()">

press this

</button>

</div>

<div class="popup" id="popup">

you deserve all the love in the universe 💗

</div>

<audio id="music" loop>

<source src="nothing.mp3" type="audio/mpeg">

</audio>

<script>

/* open letter */

function openLetter(){

document.querySelector(".envelope").style.display="none";

document.getElementById("letter").style.display="block";

let texts=document.querySelectorAll(".text");

texts.forEach((t,i)=>{

setTimeout(()=>{

t.style.opacity=1;

},600*i);

});

document.getElementById("music").play();

}

/* popup */

function showLove(){

document.getElementById("popup").classList.add("show");

}

/* hearts */

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💗";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(16+Math.random()*20)+"px";

heart.style.animationDuration=(4+Math.random()*4)+"s";

document.getElementById("hearts").appendChild(heart);

setTimeout(()=>{

heart.remove();

},8000);

}

setInterval(createHeart,400);

</script>

</body>
</html>
