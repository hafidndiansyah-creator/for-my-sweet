<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Nata 💌</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd1dc,#ffe6ee);
font-family:Arial, sans-serif;
overflow:hidden;
}

/* ENVELOPE */

.envelope{
width:220px;
height:150px;
background:#ff6f91;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-weight:bold;
cursor:pointer;
animation:shake 1.5s infinite;
}

@keyframes shake{
0%{transform:rotate(0)}
25%{transform:rotate(2deg)}
50%{transform:rotate(-2deg)}
75%{transform:rotate(2deg)}
100%{transform:rotate(0)}
}

/* LETTER */

.letter{
position:absolute;
width:320px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
display:none;
}

.name{
font-size:24px;
color:#ff4f81;
font-weight:bold;
margin-bottom:10px;
}

.text{
font-size:14px;
color:#444;
margin-top:6px;
opacity:0;
transition:0.5s;
}

button{
margin-top:12px;
background:#ff4f81;
border:none;
color:white;
padding:8px 15px;
border-radius:10px;
cursor:pointer;
}

/* HEARTS */

.heart{
position:absolute;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">
tap me 💌
</div>

<div class="letter" id="letter">

<div class="name">hey nata</div>

<p class="text">ngl... meeting you was kinda random</p>
<p class="text">but now you're literally my favorite person</p>
<p class="text">life feels softer when you're around</p>
<p class="text">so yeah...</p>
<p class="text" style="color:#ff4f81;font-weight:bold;">
i love you 💗
</p>

<button onclick="moreLove()">press this 😶‍🌫️</button>

</div>

<audio id="music" loop>
<source src="nothing.mp3" type="audio/mpeg">
</audio>

<script>

function openLetter(){

document.querySelector(".envelope").style.display="none";
document.getElementById("letter").style.display="block";

let texts=document.querySelectorAll(".text");

texts.forEach((t,i)=>{
setTimeout(()=>{
t.style.opacity=1;
},700*i);
});

document.getElementById("music").play();

}

function moreLove(){

alert("just a reminder: you're my favorite person fr 💗");

}

/* falling hearts */

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💗";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},400);

</script>

</body>
</html>
