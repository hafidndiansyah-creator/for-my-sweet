<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Nata 💗</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd1dc,#ffe6ee);
font-family:Arial;
overflow:hidden;
}

/* envelope */

.envelope{
width:70vw;
max-width:260px;
height:160px;
background:#ff6f91;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-weight:bold;
cursor:pointer;
animation:shake 1.6s infinite;
}

@keyframes shake{
0%{transform:rotate(0)}
25%{transform:rotate(2deg)}
50%{transform:rotate(-2deg)}
75%{transform:rotate(2deg)}
100%{transform:rotate(0)}
}

/* letter */

.letter{
position:absolute;
width:85vw;
max-width:340px;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
display:none;
}

.name{
font-size:22px;
color:#ff4f81;
font-weight:bold;
}

.text{
font-size:14px;
margin-top:8px;
color:#444;
opacity:0;
transition:0.5s;
}

button{
margin-top:14px;
background:#ff4f81;
border:none;
color:white;
padding:10px 18px;
border-radius:12px;
cursor:pointer;
font-size:14px;
}

/* cute popup */

.popup{
position:fixed;
bottom:-200px;
left:50%;
transform:translateX(-50%);
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:80vw;
max-width:320px;
text-align:center;
transition:0.5s;
}

.popup.show{
bottom:40px;
}

/* hearts */

.heart{
position:absolute;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">
tap me 💌
</div>

<div class="letter" id="letter">

<div class="name">hey nata</div>

<p class="text">ngl meeting you was kinda random</p>
<p class="text">but now you're literally my favorite person</p>
<p class="text">life feels softer when you're around</p>
<p class="text" style="color:#ff4f81;font-weight:bold;">
i love you 💗
</p>

<button onclick="showLove()">press this</button>

</div>

<div class="popup" id="popup">
<p>just a reminder:<br> you're my favorite person fr 💗</p>
</div>

<audio id="music" loop>
<source src="nothing.mp3" type="audio/mpeg">
</audio>

<script>

function openLetter(){

document.querySelector(".envelope").style.display="none";
document.getElementById("letter").style.display="block";

let texts=document.querySelectorAll(".text");

texts.forEach((t,i)=>{
setTimeout(()=>{
t.style.opacity=1;
},700*i);
});

document.getElementById("music").play();

}

function showLove(){
document.getElementById("popup").classList.add("show");
}

/* hearts */

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💗";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(18+Math.random()*25)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},500);

</script>

</body>
</html>
